<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوت الذكاء الاصطناعي — Groq</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0d0f;
    --surface:  #111518;
    --card:     #181d22;
    --border:   #232b33;
    --accent:   #f97316;
    --accent2:  #fb923c;
    --text:     #edf2f7;
    --muted:    #6b7a8d;
    --radius:   18px;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 70% 10%, rgba(249,115,22,.07), transparent),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(251,146,60,.05), transparent);
    pointer-events: none;
  }

  .container {
    width: 100%; max-width: 720px;
    display: flex; flex-direction: column;
    height: 90vh; max-height: 820px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(249,115,22,.06);
    position: relative;
  }

  .container::before {
    content: '';
    position: absolute;
    top: -1px; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  header {
    padding: 18px 26px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: rgba(17,21,24,.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(249,115,22,.35);
  }

  .badge {
    margin-inline-start: auto;
    background: rgba(249,115,22,.12);
    border: 1px solid rgba(249,115,22,.25);
    color: var(--accent2);
    font-size: .7rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  header h1 { font-size: 1.05rem; font-weight: 700; }
  header p  { font-size: .75rem; color: var(--muted); margin-top: 1px; }

  #chatbox {
    flex: 1; overflow-y: auto;
    padding: 22px 26px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #chatbox::-webkit-scrollbar { width: 4px; }
  #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp .3s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-av {
    width: 30px; height: 30px;
    border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .msg.user .msg-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.bot  .msg-av { background: var(--card); border: 1px solid var(--border); }

  .bubble {
    max-width: 74%;
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: .9rem;
    line-height: 1.7;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-bottom-left-radius: 5px;
  }
  .msg.bot .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-bottom-right-radius: 5px;
  }

  .welcome {
    text-align: center; color: var(--muted);
    font-size: .83rem; padding: 28px 0 4px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .welcome .icon { font-size: 2.2rem; }
  .welcome strong { color: var(--text); font-size: .97rem; }

  .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink .9s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .30s; }
  @keyframes blink {
    0%,60%,100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: rgba(17,21,24,.95);
    display: flex; gap: 10px; align-items: flex-end;
  }

  #msg {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 15px;
    font-family: 'Cairo', sans-serif;
    font-size: .9rem;
    color: var(--text);
    resize: none; outline: none;
    min-height: 46px; max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s;
  }
  #msg::placeholder { color: var(--muted); }
  #msg:focus { border-color: var(--accent); }

  #sendBtn {
    width: 46px; height: 46px;
    border-radius: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 14px rgba(249,115,22,.35);
  }
  #sendBtn:hover  { opacity: .9; transform: scale(1.05); }
  #sendBtn:active { transform: scale(.94); }
  #sendBtn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  #sendBtn svg { width: 19px; height: 19px; fill: white; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>بوت الذكاء الاصطناعي</h1>
      <p>مدعوم بـ Groq + LLaMA 3.3 + MySQL</p>
    </div>
    <div class="badge">مجاني</div>
  </header>

  <div id="chatbox">
    <div class="welcome">
      <span class="icon">⚡</span>
      <strong>أهلاً! أنا بوت سريع مدعوم بـ Groq</strong>
      <span>اكتب سؤالك وسأجيب بناءً على قاعدة المعرفة</span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msg" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const chatbox  = document.getElementById('chatbox');
  const msgInput = document.getElementById('msg');
  const sendBtn  = document.getElementById('sendBtn');

  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  function appendMsg(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `
      <div class="msg-av">${role === 'user' ? '👤' : '⚡'}</div>
      <div class="bubble">${escHtml(text)}</div>`;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing'; div.id = 'typing-ind';
    div.innerHTML = `<div class="msg-av">⚡</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function hideTyping() { document.getElementById('typing-ind')?.remove(); }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function sendMsg() {
    const message = msgInput.value.trim();
    if (!message) return;
    msgInput.value = ''; msgInput.style.height = 'auto';
    sendBtn.disabled = true;
    appendMsg(message, 'user');
    showTyping();
    try {
      const res  = await fetch('chat.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ message })
      });
      const text = await res.text();
      console.log('Server response:', text);
      let data;
      try { data = JSON.parse(text); } catch(e) { data = {reply: '⚠️ رد غير صالح من الخادم: ' + text.substring(0,200)}; }
      hideTyping();
      appendMsg(data.reply, 'bot');
    } catch(err) {
      hideTyping();
      appendMsg('❌ خطأ: ' + err.message, 'bot');
      console.error('fetch error:', err);
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }
</script>
</body>
</html>
